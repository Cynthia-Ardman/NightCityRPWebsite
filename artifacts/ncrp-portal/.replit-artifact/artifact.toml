kind = "web"
previewPath = "/"
title = "Night City RP Portal"
version = "1.0.0"
id = "artifacts/ncrp-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26128

[services.development]
run = "pnpm --filter @workspace/ncrp-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ncrp-portal", "run", "build" ]
publicDir = "artifacts/ncrp-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26128"
BASE_PATH = "/"
