      required: [id, name, fixerId, fixerName, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        archetype: { type: ["string", "null"] }
        district: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        portraitUrl: { type: ["string", "null"] }
        contact: { type: ["string", "null"] }
        fixerId: { type: string }
        fixerName: { type: string }
        createdAt: { type: string, format: date-time }

    FixerNpcInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        archetype: { type: string }
        district: { type: string }
        description: { type: string }
        portraitUrl: { type: string }
        contact: { type: string }

    FixerNpcUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        archetype: { type: string }
        district: { type: string }
        description: { type: string }
        portraitUrl: { type: string }
        contact: { type: string }

    CharacterSheet:
      type: object
      required: [id, ownerId, name, status, createdAt, data]
      properties:
        id: { type: integer }
        ownerId: { type: string }
        ownerName: { type: string }
        characterId: { type: ["integer", "null"] }
        name: { type: string }
        status: { type: string, enum: [draft, pending, approved, rejected, changes_requested] }
        discordMessageId: { type: ["string", "null"] }
        decisionBy: { type: ["string", "null"] }
        decisionNote: { type: ["string", "null"] }
        decidedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        data: { $ref: "#/components/schemas/CharacterSheetData" }

    CharacterSheetData:
      type: object
      required: [sheetType, fullName, pronouns, occupation, age, psychProfile, physicalDescription, background, skills, gear]
      description: |
        NCRP character sheet payload. `skills` and `gear` are free-text/narrative
        (no numeric values). `cyberware` is an optional list — organic characters
        may have none. Each cyberware entry's `points` carries the CWP cost
        (derived from the cyberware catalog), and the total CWP across all
        cyberware is capped at 6 at character creation. The legacy
        `attributes`, `cyberwareBySlot`, `cyberwareMisc` and `startingEddies`
        fields are deprecated and only retained for reading older records.
      properties:
        sheetType:
          type: string
          enum: [PC, NPC]
        fullName: { type: string }
        nickname: { type: ["string", "null"] }
        pronouns: { type: ["string", "null"] }
        occupation: { type: ["string", "null"] }
        archetype: { type: string }
        age: { type: integer }
        gender: { type: string }
        physicalDescription: { type: ["string", "null"] }
        appearance: { type: string }
        psychProfile: { type: ["string", "null"] }
        background: { type: string }
        attributes:
          type: object
          deprecated: true
          additionalProperties: { type: integer }
        skills:
          type: string
          description: Free-text narrative description of what the character is good at.
        cyberware:
          type: array
          description: |
            Optional list of installed cyberware. Each entry's `points` is the CWP
            cost auto-derived from the catalog. Empty for organic characters.
          items: { $ref: "#/components/schemas/CharacterSheetCyberwareEntry" }
        cyberwareBySlot:
          type: array
          deprecated: true
          description: Deprecated. Legacy fixed-slot foundational chrome layout.
          items: { $ref: "#/components/schemas/CharacterSheetCyberwareEntry" }
        cyberwareMisc:
          type: array
          deprecated: true
          description: Deprecated. Legacy unlimited misc chrome list.
          items: { $ref: "#/components/schemas/CharacterSheetCyberwareEntry" }
        cyberwarePointsSpent: { type: integer, maximum: 6 }
        gear:
          type: array
          items: { type: string }
        startingEddies:
          type: integer
          deprecated: true
        notes: { type: ["string", "null"] }

    CharacterSheetCyberwareEntry:
      type: object
      required: [slot, name, points]
      properties:
        slot: { type: string }
        name: { type: string }
        points: { type: integer }
        humanityLoss: { type: integer }
        notes: { type: ["string", "null"] }

    CharacterSheetInput:
      type: object
      required: [name, data]
      properties:
        name: { type: string, minLength: 1, maxLength: 64 }
        characterId: { type: ["integer", "null"] }
        status: { type: string, enum: [draft, pending], description: "draft skips validation and Discord; defaults to pending" }
        data: { $ref: "#/components/schemas/CharacterSheetData" }

    CharacterSheetPatchInput:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 64 }
        characterId: { type: ["integer", "null"] }
        data: { $ref: "#/components/schemas/CharacterSheetData" }

    CharacterEditSubmission:
      type: object
      required: [pendingEditId, characterId, status, submittedAt, message]
      properties:
        pendingEditId: { type: integer }
        characterId: { type: integer }
        status: { type: string, enum: [pending] }
        submittedAt: { type: string, format: date-time }
        message: { type: string }

    PendingEditSummary:
      type: object
      required: [id, characterId, characterName, submittedBy, status, submittedAt]
      properties:
        id: { type: integer }
        characterId: { type: integer }
        characterName: { type: string }
        submittedBy: { type: string }
        submitterName: { type: ["string", "null"] }
        submitterAvatarUrl: { type: ["string", "null"] }
        proposedDiff:
          type: object
          additionalProperties: true
        updateNote: { type: ["string", "null"] }
        status: { type: string, enum: [pending, approved, rejected, cancelled] }
        decisionSummary: { type: ["string", "null"] }
        submittedAt: { type: string, format: date-time }
        decidedAt: { type: ["string", "null"], format: date-time }

    PendingEditVoteRecord:
      type: object
      required: [id, voterId, vote, votedAt]
      properties:
        id: { type: integer }
        voterId: { type: string }
        voterName: { type: ["string", "null"] }
        voterAvatarUrl: { type: ["string", "null"] }
        vote: { type: string, enum: [approve, reject] }
        note: { type: ["string", "null"] }
        votedAt: { type: string, format: date-time }

    PendingEditDetail:
      type: object
      required: [id, characterId, characterName, submittedBy, proposedDiff, before, status, submittedAt, votes, eligibleVoterCount, threshold, approveCount, rejectCount, canVote]
      properties:
        id: { type: integer }
        characterId: { type: integer }
        characterName: { type: string }
        characterOwnerId: { type: ["string", "null"] }
        submittedBy: { type: string }
        submitterName: { type: ["string", "null"] }
        submitterAvatarUrl: { type: ["string", "null"] }
        proposedDiff:
          type: object
          additionalProperties: true
        before:
          type: object
          additionalProperties: true
        updateNote: { type: ["string", "null"] }
        status: { type: string, enum: [pending, approved, rejected, cancelled] }
        decisionSummary: { type: ["string", "null"] }
        submittedAt: { type: string, format: date-time }
        decidedAt: { type: ["string", "null"], format: date-time }
        votes:
          type: array
          items: { $ref: "#/components/schemas/PendingEditVoteRecord" }
        eligibleVoterCount: { type: integer }
        threshold: { type: integer }
        approveCount: { type: integer }
        rejectCount: { type: integer }
        myVote:
          oneOf:
            - type: "null"
            - type: object
              properties:
                vote: { type: string, enum: [approve, reject] }
                note: { type: ["string", "null"] }
                votedAt: { type: string, format: date-time }
        canVote: { type: boolean }

    PendingEditVoteInput:
      type: object
      required: [vote]
      properties:
        vote: { type: string, enum: [approve, reject] }
        note: { type: string, maxLength: 2000 }

    PendingEditVoteResult:
      type: object
      required: [ok, status, approveCount, rejectCount, threshold, eligibleVoterCount]
      properties:
        ok: { type: boolean }
        status: { type: string, enum: [pending, approved, rejected] }
        approveCount: { type: integer }
        rejectCount: { type: integer }
        threshold: { type: integer }
        eligibleVoterCount: { type: integer }

    SheetDecisionInput:
      type: object
      required: [decision]
      properties:
        decision: { type: string, enum: [approved, rejected, changes_requested] }
        note: { type: string }

    DiceRollInput:
      type: object
      required: [expression]
      properties:
        expression: { type: string, minLength: 1, maxLength: 64, description: "e.g. 1d20+5, 4d6kh3" }
        label: { type: string }
        characterId: { type: integer }

    DiceRollResult:
      type: object
      required: [id, expression, total, rolls, createdAt]
      properties:
        id: { type: integer }
        expression: { type: string }
        label: { type: ["string", "null"] }
        characterId: { type: ["integer", "null"] }
        characterName: { type: ["string", "null"] }
        rolls:
          type: array
          items: { type: integer }
        modifier: { type: integer }
        total: { type: integer }
        createdAt: { type: string, format: date-time }

    AdminUser:
      type: object
      required: [id, discordId, username, roles, isAdmin]
      properties:
        id: { type: string }
        discordId: { type: string }
        username: { type: string }
        globalName: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        roles:
          type: array
          items: { type: string }
        isAdmin: { type: boolean }
        isFixer: { type: boolean }
        isCsApprover: { type: boolean }
        isRipperdoc: { type: boolean }
        isStoreOwner: { type: boolean }
        characterCount: { type: integer }
        lastSeenAt: { type: ["string", "null"], format: date-time }
        characters:
          type: array
          items: { $ref: "#/components/schemas/Character" }

    WalletAdjustmentInput:
      type: object
      required: [characterId, amount, reason]
      properties:
        characterId: { type: integer }
        amount: { type: integer, description: "positive or negative" }
        reason: { type: string, minLength: 1 }

    JobRunInput:
      type: object
      required: [job]
      properties:
        job: { type: string, enum: [cyberware_humanity, monthly_rent, role_sync, eviction_sweep] }

    JobRunResult:
      type: object
      required: [id, job, status, startedAt]
      properties:
        id: { type: integer }
        job: { type: string }
        status: { type: string, enum: [running, success, failed] }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: ["string", "null"], format: date-time }
        message: { type: ["string", "null"] }
        affectedCount: { type: ["integer", "null"] }

    DashboardSummary:
      type: object
      required: [characterCount, activeCharacterCount, totalEddies, openShops, attendingCount, loaCount, pendingSheets]
      properties:
        characterCount: { type: integer }
        activeCharacterCount: { type: integer }
        totalEddies: { type: integer }
        openShops: { type: integer }
        attendingCount: { type: integer }
        loaCount: { type: integer }
        pendingSheets: { type: integer }
        topFixers:
          type: array
          items: { $ref: "#/components/schemas/LeaderboardEntry" }
        recentArrivals:
          type: array
          description: |
            Roster tile data only. Intentionally excludes sheet body fields
            (background, sheetData, ownerId, importedFromThreadId, …) because
            character sheets are owner/staff-only — see /directory/characters/:id.
          items:
            type: object
            required: [id, name, kind, createdAt]
            properties:
              id: { type: integer }
              name: { type: string }
              kind: { type: string, enum: [pc, npc] }
              archetype: { type: ["string", "null"] }
              portraitUrl: { type: ["string", "null"] }
              createdAt: { type: string, format: date-time }

    UpcomingBills:
      type: object
      required: [rent, meds, cyberwareStatus, leases, totals]
      properties:
        rent:
          type: array
          items:
            type: object
            required: [characterId, characterName, amount, dueAt]
            properties:
              characterId: { type: integer }
              characterName: { type: string }
              amount: { type: integer }
              dueAt: { type: string, format: date-time }
        meds:
          type: array
          description: "Player-level cyberpsychosis meds bill (one entry per player, not per character). Empty if no PC has 7+ chrome."
          items:
            type: object
            required: [anchorCharacterId, anchorCharacterName, maxChromeCount, level, weeksUnpaid, household, multiplier, baseCharge, amount, dueAt]
            properties:
              anchorCharacterId: { type: ["integer", "null"], description: "Character driving the band (highest chrome count) — for UI linking only." }
              anchorCharacterName: { type: ["string", "null"] }
              maxChromeCount: { type: integer, description: "Highest cyberware count across the player's PCs (inventory_items category=cyberware)." }
              level: { type: string, description: "Auto-derived risk band from max chrome count: none|medium|high|extreme." }
              weeksUnpaid: { type: integer, description: "Weeks since the household's most recent ripperdoc checkup (capped at 12)." }
              household: { type: integer, description: "Number of the player's PCs that own chrome (>= 7 pieces)." }
              multiplier: { type: number, description: "Household-size multiplier applied to the base charge (1.0 + 0.25 per extra billable character)." }
              baseCharge: { type: integer, description: "Charge before the household multiplier." }
              amount: { type: integer, description: "Final charge for the player (baseCharge * multiplier, floored)." }
              dueAt: { type: string, format: date-time }
        cyberwareStatus:
          type: object
          description: "Household-level cyberware billing context — what the next weekly cron tick will see."
          required: [lastCheckupAt, weeksUnpaid, household, multiplier, topBand, breakdown]
          properties:
            lastCheckupAt: { type: ["string", "null"], format: date-time }
            weeksUnpaid: { type: integer }
            household: { type: integer, description: "Number of player's PCs with chrome >= 7 (i.e. 'above 6')." }
            multiplier: { type: number }
            topBand: { type: string, description: "Risk band currently driving the bill: none|medium|high|extreme." }
            breakdown:
              type: array
              description: "All of the player's PCs that own at least one piece of chrome, sorted by chrome count descending. Used to populate dashboard tooltips."
              items:
                type: object
                required: [characterId, characterName, chromeCount, band]
                properties:
                  characterId: { type: integer }
                  characterName: { type: string }
                  chromeCount: { type: integer }
                  band: { type: string, description: "none|medium|high|extreme based on this character's chrome count alone." }
        leases:
          type: array
          items:
            type: object
            required: [id, characterId, characterName, address, monthlyRent]
            properties:
              id: { type: integer }
              characterId: { type: integer }
              characterName: { type: string }
              address: { type: string }
              monthlyRent: { type: integer }
              paidThrough: { type: ["string", "null"], format: date-time }
        totals:
          type: object
          required: [nextRent, nextMedsWeekly, monthlyEstimate]
          properties:
            nextRent: { type: integer }
            nextMedsWeekly: { type: integer }
            monthlyEstimate: { type: integer }

    MissionAssignmentView:
      type: object
      required: [id, userId, paymentStatus]
      properties:
        id: { type: integer }
        userId: { type: string }
        userName: { type: ["string", "null"] }
        userAvatarUrl: { type: ["string", "null"] }
        characterId: { type: ["integer", "null"] }
        characterName: { type: ["string", "null"] }
        characterPortraitUrl: { type: ["string", "null"] }
        attendanceCreditedAt: { type: ["string", "null"], format: date-time }
        paymentStatus: { type: string, enum: [unpaid, paid, failed, simulated] }
        payAmount: { type: ["integer", "null"] }
        paymentError: { type: ["string", "null"] }
        paidAt: { type: ["string", "null"], format: date-time }

    MissionActorPaymentView:
      type: object
      required: [id, userId, amount, paymentStatus, source, createdAt]
      properties:
        id: { type: integer }
        userId: { type: string }
        userName: { type: ["string", "null"] }
        characterId: { type: ["integer", "null"] }
        characterName: { type: ["string", "null"] }
        amount: { type: integer }
        paymentStatus: { type: string, enum: [paid, failed, simulated] }
        source: { type: string, enum: [manual, auto] }
        paymentError: { type: ["string", "null"] }
        fixerId: { type: ["string", "null"], description: "User id of the fixer/admin who issued this actor payment." }
        fixerName: { type: ["string", "null"], description: "Display name of the fixer/admin who issued this actor payment." }
        paidAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }

    MissionSummary:
      type: object
      required: [id, title, tier, status, workflowState, slots, assignedCount, playerPay, durationMinutes, maxPlayers, createdAt, players]
      properties:
        id: { type: integer }
        title: { type: string }
        tier: { type: integer, enum: [1, 2, 3, 4] }
        status: { type: string, enum: [open, pending, completed, completed_players_paid, completed_paid, cancelled] }
        workflowState: { type: string, enum: [draft, proposal, approved, posted] }
        startAt: { type: ["string", "null"], format: date-time }
        durationMinutes: { type: integer }
        location: { type: ["string", "null"] }
        descriptionPreview: { type: ["string", "null"] }
        imageUrl: { type: ["string", "null"] }
        playerPay: { type: integer }
        slots: { type: integer }
        jobType: { type: ["string", "null"], enum: [combat, non_combat, mixed, null] }
        requestedSkills: { type: ["string", "null"] }
        client: { type: ["string", "null"] }
        maxPlayers: { type: integer }
        assignedCount: { type: integer }
        fixerId: { type: ["string", "null"] }
        fixerName: { type: ["string", "null"] }
        fixerAvatarUrl: { type: ["string", "null"] }
        discordEventId: { type: ["string", "null"] }
        discordSyncError: { type: ["string", "null"] }
        myCharacterId: { type: ["integer", "null"] }
        myCharacterName: { type: ["string", "null"] }
        myPaymentStatus: { type: ["string", "null"] }
        players:
          type: array
          description: "Assigned characters (deduped), each clickable."
          items:
            type: object
            required: [characterId, name]
            properties:
              characterId: { type: integer }
              name: { type: string }
              portraitUrl: { type: ["string", "null"] }
              userId: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    MissionDetail:
      type: object
      required: [id, title, tier, status, workflowState, slots, playerPay, durationMinutes, maxPlayers, canManage, canApprove, live, assignments, actorPayments, applications, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        tier: { type: integer, enum: [1, 2, 3, 4] }
        status: { type: string, enum: [open, pending, completed, completed_players_paid, completed_paid, cancelled] }
        workflowState: { type: string, enum: [draft, proposal, approved, posted] }
        startAt: { type: ["string", "null"], format: date-time }
        durationMinutes: { type: integer }
        location: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        imageUrl: { type: ["string", "null"] }
        playerPay: { type: integer }
        slots: { type: integer }
        jobType: { type: ["string", "null"], enum: [combat, non_combat, mixed, null] }
        requestedSkills: { type: ["string", "null"] }
        client: { type: ["string", "null"] }
        notesForPlayers: { type: ["string", "null"] }
        maxPlayers: { type: integer }
        worldLink: { type: ["string", "null"], description: "Staff-only world/join link (null for players)." }
        fixerId: { type: ["string", "null"] }
        fixerName: { type: ["string", "null"] }
        fixerAvatarUrl: { type: ["string", "null"] }
        discordEventId: { type: ["string", "null"] }
        discordSyncError: { type: ["string", "null"] }
        canManage: { type: boolean, description: "True if caller is fixer/admin (sees Fixer tab + tools)." }
        canApprove: { type: boolean, description: "True if caller is archivist/admin (can approve proposals)." }
        live: { type: boolean, description: "True = Live mode; false = Test mode (no real external effects)." }
        assignments:
          type: array
          items: { $ref: "#/components/schemas/MissionAssignmentView" }
        actorPayments:
          type: array
          items: { $ref: "#/components/schemas/MissionActorPaymentView" }
        applications:
          type: array
          description: "Player applications (full list for managers; empty for players)."
          items: { $ref: "#/components/schemas/MissionApplicationView" }
        myApplication:
          oneOf:
            - $ref: "#/components/schemas/MissionApplicationView"
            - type: "null"
          description: "The caller's own application (players only); null for managers or no application."
        createdAt: { type: string, format: date-time }
        updatedAt: { type: ["string", "null"], format: date-time }

    MissionApplicationView:
      type: object
      required: [id, userId, characterId, status, createdAt, attendanceCount, recencyWarning]
      properties:
        id: { type: integer }
        userId: { type: string }
        userName: { type: ["string", "null"] }
        userAvatarUrl: { type: ["string", "null"] }
        characterId: { type: integer }
        characterName: { type: ["string", "null"] }
        characterPortraitUrl: { type: ["string", "null"] }
        comment: { type: ["string", "null"] }
        status: { type: string, enum: [pending, accepted, withdrawn, rejected] }
        reviewedBy: { type: ["string", "null"] }
        reviewedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        attendanceCount: { type: integer }
        lastAttendedAt: { type: ["string", "null"], format: date-time }
        daysSinceLastMission: { type: ["integer", "null"] }
        recencyWarning: { type: boolean, description: "True if the character played a mission within the recency window." }

    MissionApplicationOutcome:
      type: object
      required: [id, missionId, missionTitle, characterId, status]
      properties:
        id: { type: integer }
        missionId: { type: integer }
        missionTitle: { type: string }
        characterId: { type: integer }
        characterName: { type: ["string", "null"] }
        status: { type: string, enum: [accepted, rejected] }
        reviewedAt: { type: ["string", "null"], format: date-time }

    ApplyToMissionInput:
      type: object
      required: [characterId]
      properties:
        characterId: { type: integer }
        comment: { type: ["string", "null"] }

    ReviewApplicationInput:
      type: object
      required: [action]
      properties:
        action: { type: string, enum: [accept, reject] }

    MissionConflictCheck:
      type: object
      required: [checked, conflicts]
      properties:
        checked: { type: boolean, description: "False if Discord couldn't be reached (fail-safe; never blocks)." }
        error: { type: ["string", "null"] }
        conflicts:
          type: array
          items:
            type: object
            required: [id, name, startAt]
            properties:
              id: { type: string }
              name: { type: string }
              startAt: { type: string, format: date-time }
              endAt: { type: ["string", "null"], format: date-time }

    MissionAssignmentInput:
      type: object
      description: >-
        Assign a player to a mission. Provide either userId (the player) or
        characterId; when only characterId is given the server derives the
        owning player. Entries that resolve to no player are skipped.
      properties:
        userId: { type: string }
        characterId: { type: ["integer", "null"] }

    MissionCreateInput:
      type: object
      required: [title, tier]
      properties:
        title: { type: string, minLength: 1 }
        tier: { type: integer, enum: [1, 2, 3, 4] }
        playerPay: { type: integer, minimum: 0, default: 0 }
        location: { type: string }
        description: { type: string }
        imageUrl: { type: string }
        startAt: { type: string, format: date-time }
        durationMinutes: { type: integer, minimum: 1, default: 120 }
        slots: { type: integer, minimum: 0, default: 0 }
        status: { type: string, enum: [open, pending, completed, completed_players_paid, completed_paid, cancelled] }
        worldLink: { type: string, description: "Staff-only world/join link." }
        jobType: { type: string, enum: [combat, non_combat, mixed] }
        requestedSkills: { type: string }
        client: { type: string }
        notesForPlayers: { type: string }
        maxPlayers: { type: integer, minimum: 0, default: 0 }
        assignments:
          type: array
          items: { $ref: "#/components/schemas/MissionAssignmentInput" }

    MissionUpdateInput:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        tier: { type: integer, enum: [1, 2, 3, 4] }
        playerPay: { type: integer, minimum: 0 }
        location: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
