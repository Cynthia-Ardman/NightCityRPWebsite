openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Night City RP Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: characters
  - name: inventory
  - name: wallet
  - name: status
  - name: directory
  - name: catalog
  - name: stores
  - name: ripperdocs
  - name: fixer
  - name: pending-edits
  - name: sheets
  - name: dice
  - name: admin
  - name: dashboard
  - name: storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  # ---------------- AUTH ----------------
  /auth/discord/login:
    get:
      operationId: discordLogin
      tags: [auth]
      summary: Redirect to Discord OAuth2
      responses:
        "302": { description: Redirect to Discord }
  /auth/discord/callback:
    get:
      operationId: discordCallback
      tags: [auth]
      summary: Discord OAuth2 callback
      parameters:
        - { in: query, name: code, schema: { type: string } }
        - { in: query, name: state, schema: { type: string } }
      responses:
        "302": { description: Redirect after login }
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "204": { description: Logged out }
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current session user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Me" }
        "401": { description: Not logged in }

  # ---------------- CHARACTERS ----------------
  /characters:
    get:
      operationId: listMyCharacters
      tags: [characters]
      summary: List the current user's characters (PC + NPC)
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Character" }
    post:
      operationId: createCharacter
      tags: [characters]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CharacterInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Character" }
  /characters/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    get:
      operationId: getCharacter
      tags: [characters]
      responses:
        "200":
          description: Character
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Character" }
    patch:
      operationId: updateCharacter
      tags: [characters]
      summary: Submit a character edit for fixer review
      description: |
        Character edits no longer auto-apply. Submitting a PATCH queues a
        `pending_character_edit` row that must be approved by a majority of
        FIXER / CS_APPROVER / ADMIN reviewers (the submitter is excluded
        from the eligible-voter pool). Returns 202 with the pending edit
        id. Only one pending edit may exist per character at a time.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CharacterUpdate" }
      responses:
        "202":
          description: Edit queued for review
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CharacterEditSubmission" }
        "400": { description: No changes or invalid payload }
        "409":
          description: A pending edit already exists for this character
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  pendingEditId: { type: integer }
    delete:
      operationId: deleteCharacter
      tags: [characters]
      responses:
        "204": { description: Deleted }
  /characters/{id}/updates:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    get:
      operationId: listCharacterUpdates
      tags: [characters]
      summary: Newest-first list of owner-written update notes for this character
      responses:
        "200":
          description: Update notes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CharacterUpdateNote" }
  /characters/{id}/activate:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    post:
      operationId: setActiveCharacter
      tags: [characters]
      summary: Set this character as the user's currently active one
      responses:
        "204": { description: Activated }
        "400": { description: Archived character cannot be activated }

  /characters/{id}/deactivate:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    post:
      operationId: deactivateCharacter
      tags: [characters]
      summary: Archive a character (cannot be active while archived)
      responses:
        "200":
          description: Archived
          content:
            application/json:
              schema:
                type: object
                required: [success, archived]
                properties:
                  success: { type: boolean }
                  archived: { type: boolean }
        "404": { description: Not found }

  /characters/{id}/reactivate:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    post:
      operationId: reactivateCharacter
      tags: [characters]
      summary: Restore a previously archived character
      responses:
        "200":
          description: Restored
          content:
            application/json:
              schema:
                type: object
                required: [success, archived]
                properties:
                  success: { type: boolean }
                  archived: { type: boolean }
        "404": { description: Not found }

  # ---------------- INVENTORY ----------------
  /characters/{id}/inventory:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    get:
      operationId: getCharacterInventory
      tags: [inventory]
      responses:
        "200":
          description: Inventory
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InventoryItem" }
    post:
      operationId: addInventoryItem
      tags: [inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InventoryItemInput" }
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InventoryItem" }
  /characters/{id}/inventory/{itemId}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
      - { in: path, name: itemId, required: true, schema: { type: integer } }
    patch:
      operationId: updateInventoryItem
      tags: [inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InventoryItemUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InventoryItem" }
    delete:
      operationId: removeInventoryItem
      tags: [inventory]
      responses:
        "204": { description: Removed }
  /characters/{id}/inventory/{itemId}/transfer:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
      - { in: path, name: itemId, required: true, schema: { type: integer } }
    post:
      operationId: transferInventoryItem
      tags: [inventory]
      summary: Give or sell an inventory item to another character
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InventoryTransferInput" }
      responses:
        "200":
          description: Transferred
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InventoryItem" }
        "400": { description: Bad request }
        "404": { description: Not found }
        "409": { description: Recipient unclaimed or owner missing }
        "502": { description: Wallet provider unavailable }

  # ---------------- WALLET (UnbelievaBoat is source of truth) ----------------
  /inventory-items/{uuid}:
    parameters:
      - { in: path, name: uuid, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: getInventoryItemHistory
      tags: [inventory]
      summary: Per-instance chain of custody (owner or fixer/admin)
      responses:
        "200":
          description: Item plus event timeline
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InventoryItemHistory" }
        "403": { description: Not owner / not staff }
        "404": { description: Unknown uuid }

  /characters/{id}/wallet:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Live balance from UnbelievaBoat
      responses:
        "200":
          description: Wallet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Wallet" }
  /characters/{id}/wallet/transfer:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    post:
      operationId: transferEddies
      tags: [wallet]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TransferInput" }
      responses:
        "200":
          description: Transferred
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Wallet" }
  /characters/{id}/wallet/transactions:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    get:
      operationId: getWalletTransactions
      tags: [wallet]
      responses:
        "200":
          description: Transaction history
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WalletTransaction" }

  # ---------------- STATUS (LOA / Attend / Open Shop) ----------------
  /characters/{id}/status:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    get:
      operationId: getCharacterStatus
      tags: [status]
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CharacterStatus" }
    patch:
      operationId: updateCharacterStatus
      tags: [status]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CharacterStatusUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CharacterStatus" }
  /characters/{id}/lifestyle:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    put:
      operationId: setCharacterLifestyle
      tags: [characters]
      summary: Set or clear the character's monthly lifestyle tier (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CharacterLifestyleInput" }
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Character" }
        "404": { description: Not found }

  # ---------------- PUBLIC DIRECTORIES ----------------
  /directory/ripperdocs:
    get:
      operationId: listRipperdocs
      tags: [directory]
      summary: Public list of ripperdoc clinics (no stock)
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RipperdocPublic" }
  /directory/ripperdocs/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    get:
      operationId: getRipperdocPublic
      tags: [directory]
      responses:
        "200":
          description: Ripperdoc
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RipperdocPublic" }
  /directory/stores:
    get:
      operationId: listStores
      tags: [directory]
      summary: Public list of stores (no stock)
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StorePublic" }
  /directory/stores/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    get:
      operationId: getStorePublic
      tags: [directory]
      responses:
        "200":
          description: Store
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StorePublic" }

  # ---------------- CATALOGS (read-only public) ----------------
  /catalog/guns:
    get:
      operationId: listGuns
      tags: [catalog]
      responses:
        "200":
          description: |
            Gun catalog. Entries with status="draft" are only returned when
            the caller is ADMIN or FIXER; everyone else sees only live (or
            null-status legacy) entries.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CatalogGun" }
    post:
      operationId: createGun
      tags: [catalog]
      description: |
        Fixer/admin endpoint. Creates a new weapon catalog entry. New entries
        default to status="draft" so they stay staff-only until promoted to
        live. The creation is audit-logged.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CatalogGunInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogGun" }
        "400": { description: Invalid payload }
  /catalog/guns/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    patch:
      operationId: updateGun
      tags: [catalog]
      description: |
        Fixer/admin endpoint. Any subset of editable fields may be supplied;
        omitted fields are left unchanged. Every applied edit is audit-logged
        with before/after values.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CatalogGunUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogGunUpdateResult" }
        "400": { description: Invalid payload or no changes }
        "404": { description: Gun not found }
  /catalog/cyberware:
    get:
      operationId: listCyberware
      tags: [catalog]
      responses:
        "200":
          description: Cyberware catalog
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CatalogCyberware" }
  /catalog/rent:
    get:
      operationId: listRentListings
      tags: [catalog]
      responses:
        "200":
          description: Rent and leases
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CatalogRent" }
  /catalog/rent/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    patch:
      operationId: updateRentListing
      tags: [catalog]
      summary: "Edit a housing listing (FIXER/ADMIN); used to attach/clear a single image."
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CatalogRentUpdate" }
      responses:
        "200":
          description: Updated listing
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogRent" }
        "400": { description: Invalid payload or no changes }
        "403": { description: Forbidden }
        "404": { description: Not found }
  /catalog/lifestyle:
    get:
      operationId: listLifestyleTiers
      tags: [catalog]
      summary: Active lifestyle tiers (monthly cost surcharges charged alongside rent)
      responses:
        "200":
          description: Lifestyle tiers
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LifestyleTier" }

  # ---------------- HOUSING (per-character leases) ----------------
  /housing/mine:
    get:
      operationId: listMyHousing
      tags: [housing]
      summary: Active leases across all characters owned by the signed-in user
      responses:
        "200":
          description: Leases
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/HousingLease" }
  /characters/{id}/housing:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    get:
      operationId: getCharacterHousing
      tags: [housing]
      responses:
        "200":
          description: Active leases for the character
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/HousingLease" }
  /housing/lease:
    post:
      operationId: leaseHousing
      tags: [housing]
      summary: Lease a catalog listing for one of the signed-in user's characters
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HousingLeaseInput" }
      responses:
        "201":
          description: Leased
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HousingLease" }
        "400": { description: Bad request }
        "404": { description: Not found }
  /housing/requests:
    get:
      operationId: listHousingRequests
      tags: [housing]
      summary: List housing rental requests (admin only).
      parameters:
        - in: query
          name: status
          required: false
          schema: { type: string, enum: [pending, approved, rejected], default: pending }
      responses:
        "200":
          description: Housing requests
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/HousingRequest" }
        "403": { description: Admin only }
    post:
      operationId: createHousingRequest
      tags: [housing]
      summary: Submit a rental request awaiting admin approval.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HousingLeaseInput" }
      responses:
        "201":
          description: Pending request created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HousingRequest" }
        "400": { description: Bad request }
        "404": { description: Not found }
        "409": { description: Duplicate pending request }
  /housing/requests/mine:
    get:
      operationId: listMyHousingRequests
      tags: [housing]
      summary: Requests submitted by the signed-in user (any status).
      responses:
        "200":
          description: Requests
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/HousingRequest" }
  /housing/requests/{id}/approve:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    post:
      operationId: approveHousingRequest
      tags: [housing]
      summary: Approve a pending request — materializes a housing lease (admin only).
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HousingReviewerNote" }
      responses:
        "200":
          description: Lease created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HousingLease" }
        "403": { description: Admin only }
        "404": { description: Not found }
        "409": { description: Already reviewed }
  /housing/requests/{id}/reject:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    post:
      operationId: rejectHousingRequest
      tags: [housing]
      summary: Reject a pending request (admin only).
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HousingReviewerNote" }
      responses:
        "200":
          description: Rejected request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HousingRequest" }
        "403": { description: Admin only }
        "404": { description: Not found }
        "409": { description: Already reviewed }
  /housing/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    patch:
      operationId: updateHousingLease
      tags: [housing]
      summary: Update lease metadata (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HousingLeaseUpdate" }
      responses:
        "200":
          description: Updated lease
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HousingLease" }
        "403": { description: Admin only }
        "404": { description: Not found }
    delete:
      operationId: vacateHousing
      tags: [housing]
      responses:
        "204": { description: Vacated }
        "404": { description: Not found }

  # ---------------- STORE MANAGEMENT (owner/employee) ----------------
  /stores/mine:
    get:
      operationId: listMyStores
      tags: [stores]
      summary: Stores I own or am employed at
      responses:
        "200":
          description: Stores
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Store" }
  /stores/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    get:
      operationId: getStore
      tags: [stores]
      responses:
        "200":
          description: Store with stock
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Store" }
    patch:
      operationId: updateStore
      tags: [stores]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StoreUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Store" }
  /stores/{id}/employees:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    post:
      operationId: addStoreEmployee
      tags: [stores]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmployeeInput" }
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Employee" }
  /stores/{id}/employees/{employeeId}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
      - { in: path, name: employeeId, required: true, schema: { type: integer } }
    delete:
      operationId: removeStoreEmployee
      tags: [stores]
      responses:
        "204": { description: Removed }
  /stores/{id}/sell:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    post:
      operationId: sellStoreItem
      tags: [stores]
      summary: Owner/employee rings up a sale to a buyer character
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StoreSaleInput" }
      responses:
        "200":
          description: Sold
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StoreSaleResult" }
        "400": { description: Bad request }
        "404": { description: Not found }
        "409": { description: Out of stock or buyer unclaimed }
        "502": { description: Wallet provider unavailable }
  /stores/{id}/stock:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    post:
      operationId: addStoreStock
      tags: [stores]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StockInput" }
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockItem" }
  /stores/{id}/stock/{stockId}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
      - { in: path, name: stockId, required: true, schema: { type: integer } }
    patch:
      operationId: updateStoreStock
      tags: [stores]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StockUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockItem" }
    delete:
      operationId: removeStoreStock
      tags: [stores]
      responses:
        "204": { description: Removed }

  # ---------------- RIPPERDOC MANAGEMENT ----------------
  /ripperdocs/mine:
    get:
      operationId: listMyRipperdocs
      tags: [ripperdocs]
      responses:
        "200":
          description: Clinics
          content:
            application/json:
              schema:
                type: array
