      - { in: path, name: id, required: true, schema: { type: integer } }
    post:
      operationId: cancelPendingEdit
      tags: [pending-edits]
      summary: Submitter (or admin) withdraws a pending edit
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status: { type: string }
  /characters/{id}/pending-edit:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    get:
      operationId: getCharacterPendingEdit
      tags: [pending-edits]
      summary: Convenience lookup — does this character have a pending edit?
      responses:
        "200":
          description: Pending edit exists
          content:
            application/json:
              schema:
                type: object
                required: [id, submittedAt, submittedBy]
                properties:
                  id: { type: integer }
                  submittedAt: { type: string, format: date-time }
                  submittedBy: { type: string }
        "204": { description: No pending edit }

  # ---------------- DICE ----------------
  /dice/roll:
    post:
      operationId: rollDice
      tags: [dice]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DiceRollInput" }
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DiceRollResult" }
  /dice/history:
    get:
      operationId: getDiceHistory
      tags: [dice]
      responses:
        "200":
          description: Recent rolls
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DiceRollResult" }

  # ---------------- ADMIN ----------------
  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminUser" }
  /admin/users/{userId}:
    parameters:
      - { in: path, name: userId, required: true, schema: { type: string } }
    get:
      operationId: adminGetUser
      tags: [admin]
      responses:
        "200":
          description: User
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUser" }
  /admin/users/hydrate:
    post:
      operationId: adminHydrateUsers
      tags: [admin]
      summary: Bulk-hydrate username / globalName / avatarUrl from Discord for users with placeholder usernames.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HydrateUsersInput" }
      responses:
        "200":
          description: Hydration counts
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HydrateUsersResult" }
  /admin/users/{userId}/roles:
    parameters:
      - { in: path, name: userId, required: true, schema: { type: string } }
    post:
      operationId: adminSyncUserRoles
      tags: [admin]
      summary: Re-sync this user's roles from Discord
      responses:
        "200":
          description: Synced
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUser" }
  /admin/characters:
    get:
      operationId: adminListCharacters
      tags: [admin]
      responses:
        "200":
          description: All characters
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminCharacterSummary" }
  /admin/characters/{id}/owner:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    put:
      operationId: adminAssignCharacterOwner
      tags: [admin]
      summary: Assign or reassign the ownerId of an imported (unclaimed) character.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssignOwnerInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Character" }
        "404": { description: Character or user not found }
    delete:
      operationId: adminClearCharacterOwner
      tags: [admin]
      summary: Clear ownerId on an imported character (mark it unclaimed again).
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Character" }
        "404": { description: Not found }
  /admin/characters/{id}/checkup:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    post:
      operationId: adminRecordCheckup
      tags: [admin]
      summary: Record a ripperdoc checkup — resets the weekly meds streak multiplier to 1×.
      responses:
        "200":
          description: Checkup recorded
          content:
            application/json:
              schema:
                type: object
                required: [characterId, checkupStreak]
                properties:
                  characterId: { type: integer }
                  lastCheckupAt: { type: ["string", "null"], format: date-time }
                  checkupStreak: { type: integer }
        "404": { description: Not found }

  # ---------------- DIRECTORY (public character sheets) ----------------
  /directory/characters:
    get:
      operationId: listPublicCharacters
      tags: [directory]
      summary: Public list of imported character sheets.
      parameters:
        - { in: query, name: q, schema: { type: string }, description: "Free-text filter. By default matches character name, legacy Discord handle, and owner handle. When mode=content, additionally matches against background and sheet section bodies." }
        - { in: query, name: scope, schema: { type: string, enum: [all, active, retired, unclaimed, pc, npc] } }
        - { in: query, name: tags, schema: { type: string }, description: "Comma-separated list of Discord forum tag names. Returns characters whose appliedTags overlap with any of these." }
        - { in: query, name: mode, schema: { type: string, enum: [name, content] }, description: "Search mode for `q`. `name` (default) matches identifiers only; `content` also searches sheet body text." }
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PublicCharacterSummary" }
  /directory/character-tags:
    get:
      operationId: listPublicCharacterTags
      tags: [directory]
      summary: Distinct Discord forum tag names across all imported characters.
      responses:
        "200":
          description: List of tag names, sorted alphabetically.
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
  /directory/tag-options:
    get:
      operationId: listTagOptions
      tags: [directory]
      summary: "Global reusable character tag options (any authenticated user)."
      responses:
        "200":
          description: Tag options sorted by name.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TagOption" }
    post:
      operationId: createTagOption
      tags: [directory]
      summary: "Create a new global tag option (FIXER/ADMIN)."
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TagOptionInput" }
      responses:
        "201":
          description: Created tag option
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TagOption" }
        "400": { description: Invalid payload }
        "403": { description: Forbidden }
        "409": { description: A tag with that name already exists }
  /directory/tag-options/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    delete:
      operationId: deleteTagOption
      tags: [directory]
      summary: "Delete a global tag option (FIXER/ADMIN)."
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "403": { description: Forbidden }
        "404": { description: Not found }
  /directory/characters/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    get:
      operationId: getPublicCharacter
      tags: [directory]
      summary: Full sheet data for a single imported character (public).
      responses:
        "200":
          description: Character sheet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicCharacter" }
        "404": { description: Not found }

  # ---------------- CHARACTER ARCHIVE (fixer/admin management) ----------------
  /directory/archive:
    get:
      operationId: listArchiveCharacters
      tags: [directory]
      summary: "Staff-only archive roster with full management fields (FIXER/ADMIN)."
      parameters:
        - { in: query, name: q, schema: { type: string } }
        - { in: query, name: scope, schema: { type: string, enum: [all, active, retired, claimed, unclaimed, pc, npc] } }
        - { in: query, name: status, schema: { type: string }, description: "Comma-separated life-status values (active, dead, missing, loa, retired); matches ANY." }
        - { in: query, name: bands, schema: { type: string }, description: "Comma-separated CWP bands (organic, none, medium, high, extreme); matches ANY." }
        - { in: query, name: tags, schema: { type: string }, description: "Comma-separated tag names; matches the union of applied + manual tags." }
        - { in: query, name: mode, schema: { type: string, enum: [name, content] } }
        - { in: query, name: sort, schema: { type: string, enum: [recent, name] } }
      responses:
        "200":
          description: Archive roster
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ArchiveCharacterSummary" }
        "403": { description: Forbidden }
  /directory/archive/users:
    get:
      operationId: listArchiveUsers
      tags: [directory]
      summary: "Owner-picker user search for the archive editor (FIXER/ADMIN)."
      parameters:
        - { in: query, name: q, schema: { type: string } }
      responses:
        "200":
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ArchiveUser" }
        "403": { description: Forbidden }
  /directory/archive/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    get:
      operationId: getArchiveCharacter
      tags: [directory]
      summary: "Full editable character detail for the archive editor (FIXER/ADMIN)."
      responses:
        "200":
          description: Character
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArchiveCharacter" }
        "403": { description: Forbidden }
        "404": { description: Not found }
    patch:
      operationId: updateArchiveCharacter
      tags: [directory]
      summary: "Immediate-apply staff edit. Requires a non-empty commitMessage; audit-logged."
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ArchiveEditInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArchiveEditResult" }
        "400": { description: Invalid edit or blank commit message }
        "403": { description: Forbidden }
        "404": { description: Not found }

  # ---------------- STORAGE ----------------
  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UploadUrlRequest" }
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadUrlResponse" }
        "400": { description: Missing or invalid required fields. }
        "500": { description: Failed to generate upload URL. }
  /storage/public-objects/{filePath}:
    get:
      tags: [storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - { in: path, name: filePath, required: true, schema: { type: string } }
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema: { type: string, format: binary }
        "404": { description: File not found. }
  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - { in: path, name: objectPath, required: true, schema: { type: string } }
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema: { type: string, format: binary }
        "404": { description: Object not found. }
  /admin/wallet/adjust:
    post:
      operationId: adminAdjustWallet
      tags: [admin]
      summary: Manual eddie adjustment (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WalletAdjustmentInput" }
      responses:
        "200":
          description: Adjusted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Wallet" }
  /admin/jobs/run:
    post:
      operationId: adminRunJob
      tags: [admin]
      summary: Manually trigger a cron job
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JobRunInput" }
      responses:
        "200":
          description: Job triggered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobRunResult" }
  /admin/jobs:
    get:
      operationId: adminListJobs
      tags: [admin]
      responses:
        "200":
          description: Recent job runs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/JobRunResult" }

  # ---------------- DASHBOARD ----------------
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Top-level dashboard counts and recent activity
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }
  /dashboard/upcoming-bills:
    get:
      operationId: getUpcomingBills
      tags: [dashboard]
      summary: Projected rent and cyberpsychosis-meds charges for the signed-in user
      responses:
        "200":
          description: Upcoming bills
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpcomingBills" }
  # ---------------- WHOLESALER ----------------
  /wholesaler/items:
    get:
      operationId: listWholesalerItems
      tags: [wholesaler]
      summary: Wholesaler catalog (fixer-visible)
      parameters:
        - in: query
          name: all
          schema: { type: boolean }
          description: Include archived items (admin UI).
      responses:
        "200":
          description: Items
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WholesalerItem" }
  /admin/lifestyle-tiers:
    get:
      operationId: adminListLifestyleTiers
      tags: [lifestyle]
      summary: List all lifestyle tiers (including archived)
      responses:
        "200":
          description: Lifestyle tiers
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LifestyleTier" }
    post:
      operationId: adminCreateLifestyleTier
      tags: [lifestyle]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LifestyleTierInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LifestyleTier" }
  /admin/lifestyle-tiers/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    patch:
      operationId: adminUpdateLifestyleTier
      tags: [lifestyle]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LifestyleTierPatch" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LifestyleTier" }
    delete:
      operationId: adminArchiveLifestyleTier
      tags: [lifestyle]
      responses:
        "204": { description: Archived }
  /admin/wholesaler/items:
    post:
      operationId: adminCreateWholesalerItem
      tags: [wholesaler]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WholesalerItemInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WholesalerItem" }
  /admin/wholesaler/items/{id}:
    patch:
      operationId: adminUpdateWholesalerItem
      tags: [wholesaler]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WholesalerItemPatch" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WholesalerItem" }
    delete:
      operationId: adminArchiveWholesalerItem
      tags: [wholesaler]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Archived }
  /wholesaler/restock:
    post:
      operationId: wholesalerRestock
      tags: [wholesaler]
      summary: Fixer buys units from the wholesaler and pushes them into a venue's stock.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WholesalerRestockInput" }
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WholesalerRestockResult" }
  /wholesaler/orders:
    get:
      operationId: listWholesalerOrders
      tags: [wholesaler]
      parameters:
        - in: query
          name: kind
          required: true
          schema: { type: string, enum: [store, ripperdoc] }
        - in: query
          name: venueId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WholesalerOrder" }

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      responses:
        "200":
          description: Recent activity events
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ActivityEvent" }
  /me/wallet:
    get:
      operationId: getMyWallet
      tags: [wallet]
      summary: Per-user eddies balance from Unbelievaboat (account-level, not per-character)
      responses:
        "200":
          description: Wallet balance for signed-in user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserWallet" }
  /me/wallet/transactions:
    get:
      operationId: getMyWalletTransactions
      tags: [wallet]
      summary: Combined wallet ledger for the signed-in user across all their characters
      responses:
        "200":
          description: Transaction history
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WalletTransaction" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    Me:
      type: object
      required: [id, discordId, username, avatarUrl, roles, isAdmin, isFixer, isArchivist, isCsApprover, isRipperdoc, isStoreOwner]
      properties:
        id: { type: string }
        discordId: { type: string }
        username: { type: string }
        globalName: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        roles:
          type: array
          items: { type: string }
        isAdmin: { type: boolean }
        isFixer: { type: boolean }
        isArchivist: { type: boolean }
        isCsApprover: { type: boolean }
        isRipperdoc: { type: boolean }
        isStoreOwner: { type: boolean }
        activeCharacterId: { type: ["integer", "null"] }
        vrchat:
          oneOf:
            - { $ref: "#/components/schemas/VrchatLinkSummary" }
            - { type: "null" }
          description: "Linked VRChat profile for this Discord user, or null if none registered."

    Character:
      type: object
      required: [id, name, kind, createdAt, claimed, archived, portraitUrls, statsImageUrls]
      properties:
        id: { type: integer }
        ownerId: { type: ["string", "null"] }
        claimed: { type: boolean }
        legacyDiscordUsername: { type: ["string", "null"] }
        name: { type: string }
        kind: { type: string, enum: [pc, npc] }
        archetype: { type: ["string", "null"] }
        background: { type: ["string", "null"] }
        portraitUrl: { type: ["string", "null"] }
        portraitUrls:
          type: array
          items: { type: string }
        statsImageUrls:
          type: array
          items: { type: string }
        sheetData:
          oneOf:
            - { type: "null" }
            - { $ref: "#/components/schemas/SheetData" }
        importedFromThreadId: { type: ["string", "null"] }
        importedFromChannelName: { type: ["string", "null"] }
        discordChannelId: { type: ["string", "null"] }
        isActive: { type: boolean }
        approved: { type: boolean }
        archived: { type: boolean }
        lifeStatus:
          type: string
          enum: [active, dead, missing, loa, retired]
          description: "Headline character status shown on sheets. Editable by the owner via PATCH /characters/{id}."
        lifestyleTierId: { type: ["integer", "null"] }
        lifestyleTier:
          oneOf:
            - { type: "null" }
            - { $ref: "#/components/schemas/LifestyleTier" }
        traumaTeamTier:
          type: ["string", "null"]
          enum: [silver, gold, platinum, diamond, null]
          description: "Trauma Team subscription tier. Billed monthly from bot_config.trauma_team_costs. Null = no subscription."
        xanaduGold:
          type: boolean
          description: "Xanadu Gold premium membership. Flat monthly fee from bot_config.xanadu_gold_cost."
        lastCheckupAt:
          type: ["string", "null"]
          format: date-time
          description: "Timestamp of the last ripperdoc checkup. Null = never had one."
        checkupStreak:
          type: integer
          description: "Consecutive weekly cron ticks since the last checkup. Multiplies the weekly meds bill (1× → 10× max)."
        cyberwareLevel:
          type: string
          enum: [none, medium, high, extreme]
          description: "Cyberware-risk band set by a ripperdoc on checkup. Drives the weekly meds cap in the cyberware cron: none=no charge, medium=2k cap, high=5k cap, extreme=10k cap."
        isOrganic:
          type: boolean
          description: "Marks this character as having zero chrome on purpose (CWP=0 in the importer). Suppresses missing-cyberware warnings on the dashboard."
        createdAt: { type: string, format: date-time }

    SheetData:
      type: object
      required: [preamble, sections]
      properties:
        preamble: { type: string }
        sections:
          type: object
          additionalProperties: { type: string }

    PublicCharacterSummary:
      type: object
      required: [id, name, kind, claimed, archived]
      properties:
        id: { type: integer }
        name: { type: string }
        kind: { type: string }
        archetype: { type: ["string", "null"] }
        portraitUrl: { type: ["string", "null"] }
        portraitUrls: { type: array, items: { type: string } }
        claimed: { type: boolean }
        archived: { type: boolean }
        legacyDiscordUsername: { type: ["string", "null"] }
        ownerName: { type: ["string", "null"] }
        vrchatUsername: { type: ["string", "null"], description: "Owner's linked VRChat display name, or null if unlinked/unclaimed." }
        vrchatUrl: { type: ["string", "null"], description: "Owner's VRChat profile URL, or null." }
        appliedTags: { type: array, items: { type: string }, description: "Discord forum tags applied to the source thread, resolved to display names." }
        tags: { type: array, items: { type: string }, description: "Merged display tag list (Discord-applied ∪ staff-added)." }
        lifeStatus:
          type: string
          enum: [active, dead, missing, loa, retired]

    PublicCharacter:
      allOf:
        - $ref: "#/components/schemas/Character"
        - type: object
          properties:
            ownerName: { type: ["string", "null"] }
            ownerAvatarUrl: { type: ["string", "null"] }
            tags: { type: array, items: { type: string }, description: "Merged display tag list (Discord-applied ∪ staff-added)." }

    ArchiveCharacterSummary:
      type: object
      required: [id, name, kind, claimed, archived, cwpBand, tags]
      properties:
        id: { type: integer }
        name: { type: string }
        kind: { type: string }
